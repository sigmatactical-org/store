<div class="d-flex align-items-center">
  <a class="btn btn-outline-light btn-sm me-2" href="{{ contact_us_url|safe }}">Contact us</a>
  <a
    class="btn btn-outline-light btn-sm position-relative me-2"
    href="{{ cart_url|safe }}"
    aria-label="Cart{% if cart_count > 0 %} ({{ cart_count }} items){% endif %}"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="6" cy="14" r="1" />
      <circle cx="13" cy="14" r="1" />
      <path d="M1 1h2l1.6 8.4a1 1 0 0 0 1 .8h6.4a1 1 0 0 0 1-.8L15 4H4" />
    </svg>
    {% if cart_count > 0 %}
    <span class="badge rounded-pill text-bg-primary position-absolute top-0 start-100 translate-middle">{{ cart_count }}</span>
    {% endif %}
  </a>
  {% include "nav_sign_in.html" %}
</div>
